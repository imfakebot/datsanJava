<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed - Datsan</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .result-container {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon-failed {
            width: 80px;
            height: 80px;
            color: #ef4444;
            margin: 0 auto 20px;
        }
        .result-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #111827;
        }
        .result-desc {
            color: #6b7280;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 24px;
            background-color: #111827;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
        }
        .btn-home:hover {
            background-color: #374151;
        }
    </style>
</head>
<body style="background-color: #f9fafb;">

    <header class="header container">
        <div class="header-left">
            <a href="/" class="logo">Datsan</a>
        </div>
    </header>

    <div class="result-container">
        <svg class="icon-failed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <h2 class="result-title">Payment Failed</h2>
        <p class="result-desc" th:text="${message}">We couldn't process your payment. Please try again.</p>
        <a href="/" class="btn-home">Return to Homepage</a>
    </div>

</body>
</html>
