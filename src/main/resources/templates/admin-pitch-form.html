<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sân Bóng - Admin</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <a href="/admin/dashboard" class="navbar-brand">
            <i class="ph ph-shield-star"></i>
            <div>Admin Dashboard</div>
        </a>
        <div class="navbar-right">
            <a href="/admin/dashboard" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.875rem;">
                <i class="ph ph-arrow-left"></i> Quay lại
            </a>
            <a href="/logout" class="logout-btn">
                Đăng Xuất <i class="ph ph-sign-out"></i>
            </a>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width: 800px; margin: 0 auto;">
        <div class="section-header">
            <i class="ph ph-soccer-ball"></i>
            <h1 th:text="${pitch.id == null ? 'Thêm Sân Bóng Mới' : 'Sửa Thông Tin Sân Bóng'}" style="margin: 0; font-size: 1.5rem;">Quản lý Sân Bóng</h1>
        </div>

        <div class="bento-card">
            <form th:action="@{${pitch.id != null} ? '/admin/pitches/' + ${pitch.id} + '/edit' : '/admin/pitches/create'}"
                th:object="${pitch}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label>Tên Sân Bóng *</label>
                    <input type="text" th:field="*{name}" class="form-input" required placeholder="VD: Sân Bóng Chảo Lửa">
                </div>

                <div class="form-group">
                    <label>Hình Ảnh (Chọn nhiều file từ máy tính)</label>
                    <input type="file" name="imageFiles" multiple accept="image/*" class="form-input" style="padding: 0.5rem; cursor: pointer;">
                    
                    <div th:if="${pitch.images != null and !pitch.images.isEmpty()}" style="margin-top: 1rem; background: var(--zinc-900); border: 1px solid var(--zinc-800); padding: 1rem; border-radius: var(--radius);">
                        <p style="margin: 0 0 1rem 0; font-size: 0.875rem; color: var(--zinc-400);">Ảnh hiện tại:</p>
                        <div style="display: flex; gap: 0.75rem; overflow-x: auto; padding-bottom: 0.5rem;">
                            <img th:each="img : ${pitch.images}" th:src="${img.imageUrl}" style="height: 64px; width: 64px; object-fit: cover; border-radius: 4px; border: 1px solid var(--zinc-700);">
                        </div>
                        <label style="display: inline-flex; align-items: center; cursor: pointer; margin-top: 1rem; color: #f87171; font-size: 0.875rem; font-weight: 500;">
                            <input type="checkbox" name="deleteAllImages" value="true" style="margin-right: 0.5rem; width: 1rem; height: 1rem; accent-color: #f87171;">
                            Xóa toàn bộ ảnh cũ trước khi lưu
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Địa Chỉ / Vị Trí *</label>
                    <input type="text" th:field="*{location}" class="form-input" required placeholder="VD: 30 Phan Thúc Duyện, Tân Bình">
                </div>
                
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label>Tọa độ thông minh (Dán tọa độ từ Google Maps để tự động điền)</label>
                    <div style="position: relative;">
                        <input type="text" id="smartCoords" class="form-input" placeholder="VD: 15°58'40.2&quot;N 108°15'11.3&quot;E hoặc 10.762622, 106.660172" style="padding-right: 2.5rem;">
                        <i class="ph ph-magic-wand" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--zinc-400); font-size: 1.2rem; transition: all 0.3s;"></i>
                    </div>
                </div>

                <div class="bento-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Vĩ độ (Latitude)</label>
                        <input type="number" step="any" th:field="*{latitude}" id="latitude" class="form-input" placeholder="VD: 10.762622">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Kinh độ (Longitude)</label>
                        <input type="number" step="any" th:field="*{longitude}" id="longitude" class="form-input" placeholder="VD: 106.660172">
                    </div>
                </div>

                <div class="bento-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Loại Sân *</label>
                        <select th:field="*{pitchType}" class="form-input" required style="cursor: pointer;">
                            <option value="">-- Chọn loại sân --</option>
                            <option value="Sân 5">Sân 5 người</option>
                            <option value="Sân 7">Sân 7 người</option>
                            <option value="Sân 11">Sân 11 người</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;" th:if="${pitch.id != null}">
                        <label>Trạng Thái *</label>
                        <select th:field="*{status}" class="form-input" required style="cursor: pointer;">
                            <option value="Available">Available</option>
                            <option value="Maintenance">Maintenance</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mô tả Sân Bóng</label>
                    <textarea th:field="*{description}" class="form-input" placeholder="Nhập mô tả về sân bóng..." style="min-height: 100px; resize: vertical; font-family: inherit; line-height: 1.5;"></textarea>
                </div>

                <div class="form-group">
                    <label>Tiện ích (phân cách bằng dấu phẩy)</label>
                    <textarea th:field="*{amenities}" class="form-input" placeholder="VD: Cỏ nhân tạo cao cấp, Đèn LED chiếu sáng, Bãi đỗ xe miễn phí" style="min-height: 80px; resize: vertical; font-family: inherit; line-height: 1.5;"></textarea>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1rem;">
                        <i class="ph ph-floppy-disk"></i>
                        <span th:text="${pitch.id == null ? 'Lưu Sân Bóng' : 'Cập Nhật Thay Đổi'}">Lưu</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('smartCoords').addEventListener('input', function(e) {
            const val = e.target.value.trim();
            if (!val) return;

            const latInput = document.getElementById('latitude');
            const lonInput = document.getElementById('longitude');
            const icon = this.nextElementSibling;

            const onSuccess = (lat, lon) => {
                latInput.value = lat;
                lonInput.value = lon;
                
                // Show success effect
                icon.className = "ph ph-check-circle";
                icon.style.color = "#10b981"; // emerald
                setTimeout(() => {
                    icon.className = "ph ph-magic-wand";
                    icon.style.color = "var(--zinc-400)";
                    e.target.value = ""; // Clear after success
                }, 1500);
            };

            // Parse Decimal (e.g. 10.762622, 106.660172)
            const decimalMatch = val.match(/^(-?\d+\.\d+)[,\s]+(-?\d+\.\d+)$/);
            if (decimalMatch) {
                onSuccess(parseFloat(decimalMatch[1]).toFixed(6), parseFloat(decimalMatch[2]).toFixed(6));
                return;
            }

            // Parse DMS (e.g. 15°58'40.2"N 108°15'11.3"E)
            // Supports various quotation marks used by maps
            const dmsRegex = /(\d+)°(\d+)'([\d.]+)(?:\"|”|'')[NS]\s+(\d+)°(\d+)'([\d.]+)(?:\"|”|'')[EW]/i;
            const fullMatch = val.match(/(\d+)°(\d+)'([\d.]+)(?:\"|”|'|'')([NS])\s+(\d+)°(\d+)'([\d.]+)(?:\"|”|'|'')([EW])/i);
            
            if (fullMatch) {
                const latDeg = parseFloat(fullMatch[1]);
                const latMin = parseFloat(fullMatch[2]);
                const latSec = parseFloat(fullMatch[3]);
                const latDir = fullMatch[4].toUpperCase();

                const lonDeg = parseFloat(fullMatch[5]);
                const lonMin = parseFloat(fullMatch[6]);
                const lonSec = parseFloat(fullMatch[7]);
                const lonDir = fullMatch[8].toUpperCase();

                let lat = latDeg + (latMin / 60) + (latSec / 3600);
                if (latDir === 'S') lat = -lat;

                let lon = lonDeg + (lonMin / 60) + (lonSec / 3600);
                if (lonDir === 'W') lon = -lon;

                onSuccess(lat.toFixed(6), lon.toFixed(6));
            }
        });
    </script>
</body>
</html>
